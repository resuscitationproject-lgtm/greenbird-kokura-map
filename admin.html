<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#15803d">
    <title>管理者モード | グリーンバード小倉</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @media print {
        .no-print {
          display: none !important;
        }

        body {
          background: white !important;
        }

        #report-panel {
          box-shadow: none !important;
          padding: 0 !important;
        }
      }
    </style>
  </head>
  <body class="min-h-dvh bg-slate-100 text-slate-900">
    <header class="no-print bg-green-700 px-4 py-4 text-white shadow-md">
      <div class="mx-auto flex max-w-5xl items-center justify-between gap-3">
        <div>
          <h1 class="text-lg font-bold sm:text-xl">管理者モード</h1>
          <p class="text-xs text-green-100">CSV・日次レポート出力</p>
        </div>
        <a
          href="./index.html"
          class="rounded-lg bg-green-800 px-3 py-2 text-sm font-bold hover:bg-green-900"
        >
          ← マップに戻る
        </a>
      </div>
    </header>

    <main class="mx-auto max-w-5xl p-4 sm:p-6">
      <section id="login-panel" class="mx-auto max-w-md rounded-2xl bg-white p-6 shadow-lg">
        <h2 class="text-xl font-bold">管理者ログイン</h2>
        <p class="mt-2 text-sm text-slate-600">
          Firebase Authenticationに登録した管理者アカウントでログインしてください。
        </p>

        <form id="login-form" class="mt-5 space-y-4">
          <label class="block text-sm font-medium">
            メールアドレス
            <input
              id="admin-email"
              type="email"
              autocomplete="username"
              required
              class="mt-1 w-full rounded-lg border border-slate-300 p-3 focus:border-green-600 focus:outline-none focus:ring-4 focus:ring-green-100"
            >
          </label>
          <label class="block text-sm font-medium">
            パスワード
            <input
              id="admin-password"
              type="password"
              autocomplete="current-password"
              required
              class="mt-1 w-full rounded-lg border border-slate-300 p-3 focus:border-green-600 focus:outline-none focus:ring-4 focus:ring-green-100"
            >
          </label>
          <p id="login-error" class="hidden rounded-lg bg-red-50 p-3 text-sm text-red-700" role="alert"></p>
          <button
            id="login-button"
            type="submit"
            class="w-full rounded-xl bg-green-700 px-4 py-3 font-bold text-white hover:bg-green-800 disabled:opacity-60"
          >
            ログイン
          </button>
        </form>
      </section>

      <section id="admin-panel" class="hidden">
        <div class="no-print mb-4 flex flex-wrap items-center justify-between gap-3 rounded-xl bg-white p-4 shadow">
          <p class="text-sm">
            ログイン中：
            <strong id="admin-user"></strong>
          </p>
          <button id="logout-button" type="button" class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-bold hover:bg-slate-50">
            ログアウト
          </button>
        </div>

        <div class="no-print mb-6 grid gap-4 rounded-2xl bg-white p-5 shadow-lg md:grid-cols-2">
          <section>
            <h2 class="text-lg font-bold">CSV出力</h2>
            <p class="mt-1 text-sm text-slate-600">日時、緯度、経度、ゴミの量、メモを出力します。</p>
            <div class="mt-4 flex flex-wrap gap-3">
              <button id="export-all-csv" type="button" disabled class="rounded-xl bg-blue-600 px-4 py-3 font-bold text-white hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50">
                全データをCSV出力
              </button>
              <button id="export-daily-csv" type="button" disabled class="rounded-xl border-2 border-blue-600 px-4 py-3 font-bold text-blue-700 hover:bg-blue-50 disabled:cursor-not-allowed disabled:opacity-50">
                選択日のCSV出力
              </button>
            </div>
          </section>

          <section>
            <h2 class="text-lg font-bold">日次レポート</h2>
            <label class="mt-3 block text-sm font-medium">
              対象日
              <input id="report-date" type="date" class="mt-1 w-full rounded-lg border border-slate-300 p-3">
            </label>
            <div class="mt-3 flex flex-wrap gap-3">
              <button id="create-report" type="button" class="rounded-xl bg-green-700 px-4 py-3 font-bold text-white hover:bg-green-800">
                レポートを作成
              </button>
              <button id="print-report" type="button" class="rounded-xl border-2 border-green-700 px-4 py-3 font-bold text-green-800 hover:bg-green-50">
                印刷・PDF保存
              </button>
            </div>
          </section>

          <p id="admin-status" class="md:col-span-2 rounded-lg bg-slate-50 p-3 text-sm text-slate-700" role="status">
            データを読み込んでいます…
          </p>
        </div>

        <article id="report-panel" class="rounded-2xl bg-white p-5 shadow-lg sm:p-8">
          <div class="border-b border-slate-200 pb-4">
            <p class="text-sm font-bold text-green-700">北九州グリーンバード小倉チーム</p>
            <h2 class="mt-1 text-2xl font-bold">ゴミ拾い活動 日次レポート</h2>
            <p id="report-date-label" class="mt-2 text-slate-600">対象日を選択してください。</p>
          </div>

          <div class="mt-6 grid grid-cols-2 gap-3 sm:grid-cols-4">
            <div class="rounded-xl bg-green-50 p-4">
              <p class="text-sm text-slate-600">報告件数</p>
              <p id="summary-count" class="mt-1 text-2xl font-bold">0</p>
            </div>
            <div class="rounded-xl bg-blue-50 p-4">
              <p class="text-sm text-slate-600">ゴミ量合計</p>
              <p id="summary-total" class="mt-1 text-2xl font-bold">0</p>
            </div>
            <div class="rounded-xl bg-amber-50 p-4">
              <p class="text-sm text-slate-600">平均評価</p>
              <p id="summary-average" class="mt-1 text-2xl font-bold">-</p>
            </div>
            <div class="rounded-xl bg-purple-50 p-4">
              <p class="text-sm text-slate-600">最多評価</p>
              <p id="summary-mode" class="mt-1 text-2xl font-bold">-</p>
            </div>
          </div>

          <section class="mt-7">
            <h3 class="text-lg font-bold">5段階評価の内訳</h3>
            <div id="amount-breakdown" class="mt-3 space-y-2"></div>
          </section>

          <section class="mt-7">
            <h3 class="text-lg font-bold">報告一覧</h3>
            <div class="mt-3 overflow-x-auto">
              <table class="w-full min-w-[680px] border-collapse text-left text-sm">
                <thead>
                  <tr class="bg-slate-100">
                    <th class="border border-slate-300 p-2">時刻</th>
                    <th class="border border-slate-300 p-2">量</th>
                    <th class="border border-slate-300 p-2">緯度</th>
                    <th class="border border-slate-300 p-2">経度</th>
                    <th class="border border-slate-300 p-2">メモ</th>
                  </tr>
                </thead>
                <tbody id="report-rows"></tbody>
              </table>
            </div>
          </section>

          <p class="mt-8 text-right text-xs text-slate-500">
            出力日時：<span id="generated-at">-</span>
          </p>
        </article>
      </section>
    </main>

    <script type="module" src="./js/admin.js"></script>
  </body>
</html>
