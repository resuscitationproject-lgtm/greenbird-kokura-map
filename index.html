<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#15803d">
    <title>グリーンバード小倉 ゴミ拾いマップ</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
    >

    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      #map {
        width: 100%;
        height: calc(100vh - 64px);
        height: calc(100dvh - 64px);
        min-height: 400px;
      }
    </style>
  </head>

  <body class="bg-slate-100 text-slate-900">
    <header
      class="flex h-16 items-center justify-between gap-3 bg-green-700 px-4 text-white shadow-md"
    >
      <div>
        <h1 class="text-base font-bold sm:text-xl">
          グリーンバード小倉
        </h1>
        <p class="hidden text-xs text-green-100 sm:block">
          ゴミ拾い可視化マップ
        </p>
      </div>

      <a
        href="./input.html"
        class="shrink-0 rounded-lg bg-white px-3 py-2 text-sm font-bold text-green-800 shadow transition hover:bg-green-50 focus:outline-none focus:ring-2 focus:ring-white"
      >
        ＋ データを入力
      </a>
    </header>

    <main class="relative">
      <div
        id="map"
        aria-label="ゴミ拾い報告のヒートマップ"
      ></div>

      <div
        id="map-status"
        class="absolute left-1/2 top-4 z-[1000] max-w-[calc(100%-2rem)] -translate-x-1/2 rounded-lg bg-white/95 px-4 py-2 text-center text-sm font-medium shadow"
        role="status"
      >
        データを読み込んでいます…
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
